- slug: fig-for-innsats
  title: FIG før innsats
  phase: for
  roles: [mannskap, lagforer]
  scenarios: [generelt]
  equipmentRequired: [personlig-utrustning, verneutstyr, samband, kjoretoy]
  items:
    - id: kontakt-beredskapsvakt
      label: Kontakt beredskapsvakt og bekreft mottatt oppdrag, oppmøte og rapporteringslinje
      required: true
      sourceIds: [src-sjekkliste-fig-og-figp, src-tiltakskort-for-innsats]
    - id: fremmoteliste
      label: Fremmøteliste er startet lokalt uten personopplysninger utover lokale rutiner
      required: true
      sourceIds: [src-sjekkliste-fig-og-figp]
    - id: personell-skikkethet-sikkerhet-helse
      label: Personell vurdert skikket for oppdraget med hensyn til sikkerhet, helse og utholdenhet
      required: true
      sourceIds: [src-sjekkliste-fig-og-figp, src-tiltakskort-for-innsats]
    - id: personlig-utstyr
      label: Personlig utstyr og verneutstyr kontrollert før avreise
      required: true
      sourceIds: [src-sjekkliste-fig-og-figp]
    - id: fellesutstyr
      label: Fellesutstyr og samband kontrollert mot oppdragets behov
      required: true
      sourceIds: [src-sjekkliste-fig-og-figp, src-kommunikasjons-og-sambandsdiagram]
    - id: kjoretoy-klar
      label: Kjøretøy er klart, pakket forsvarlig og egnet for oppdraget
      required: true
      sourceIds: [src-sjekkliste-fig-og-figp]
    - id: drivstoff-beredskap
      label: Drivstoff, rekkevidde og beredskap for retur/omdisponering er kontrollert
      required: true
      sourceIds: [src-sjekkliste-fig-og-figp]
    - id: vaer-og-farevurdering
      label: Vær, føre og relevante farer er vurdert manuelt før utrykning; ikke lagre rå eksterne datasett
      required: true
      sourceIds: [src-tiltakskort-for-innsats]
    - id: forelopig-plan
      label: Foreløpig plan for fremføring, oppmarsj og første tiltak er formulert
      required: true
      sourceIds: [src-5-punktsordre, src-tiltakskort-for-innsats]
    - id: ordre-tilbakelesing
      label: Ordre gitt med tilbakelesing av oppdrag, sikkerhet, samband og rapportering
      required: true
      sourceIds: [src-5-punktsordre, src-kommunikasjons-og-sambandsdiagram]
    - id: logg-startet
      label: Lokal oppdragslogg er startet før avreise
      required: true
      sourceIds: [src-sjekkliste-fig-og-figp, src-5-punktsordre]
    - id: klar-til-distrikt
      label: Klar til avreise meldt til distrikt/beredskapsvakt etter lokale rutiner
      required: true
      sourceIds: [src-sjekkliste-fig-og-figp, src-kommunikasjons-og-sambandsdiagram]
  sourceIds: [src-sjekkliste-fig-og-figp, src-tiltakskort-for-innsats, src-5-punktsordre, src-kommunikasjons-og-sambandsdiagram]
  warning: Lokal ordre gjelder. Bruk sjekklisten som offentlig beslutningsstøtte; ikke legg inn persondata, pasientdata eller skjermet operativ informasjon.

