- id: private-tilfluktsromdata
  question: Kan jeg legge inn eller publisere private/skjermede tilfluktsromdata?
  answer: Nei. MVP-en skal bare vise offentlig eller eksplisitt godkjent informasjon. Private, skjermede eller graderte lokasjonslister skal ikke inn i appen.
