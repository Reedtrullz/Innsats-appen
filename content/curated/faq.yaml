- id: beslutningsstotte-og-ordre
  question: Er Beredskapsboka en offisiell ordre eller et kommando-/kontrollsystem?
  answer: Nei. Innholdet er beslutningsstøtte for offentlig, ikke-sensitiv bruk. Gjeldende ordre, lokal plan og fagmyndighet går alltid foran.
