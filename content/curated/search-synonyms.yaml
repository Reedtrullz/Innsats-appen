# Operational search synonyms – canonical terms mapped to aliases and misspellings.
# Each group has a canonical term and a list of aliases. Aliases are folded to
# the canonical term at search time so that querying any alias matches the same
# documents as the canonical term.
#
# cardIds – optional list of action-card slugs that this group should boost for.
# When a cardId is listed, the canonical term + all aliases are injected into
# that card's synonym field even if the term does not appear in the card text.
