- id: hva-na-kort-faggjennomgang
  title: Hva nå-kort er ikke faggodkjent ennå
  body: De nye stresskortene viser første avklaringer og stoppunkter når situasjonen endrer seg. De er merket Til faggjennomgang og skal brukes som beslutningsstøtte sammen med gjeldende ordre, innsatsledelse og fagmyndighet. De erstatter ikke ordre, dispatch, ressursstyring, pasienthåndtering eller sporing.
  severity: warning
  changedAt: 2026-06-19
