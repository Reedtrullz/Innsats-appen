- slug: soketeig-plan-kart
  title: Søketeig plan på lokalt kart
  phase: under
  roles: [ lagforer, leder, mannskap ]
  scenarios: [ sok-og-redning ]
  priority: high
  steps:
    - Bekreft oppdrag, teiggrense, metode, laginndeling, samband og
      rapporteringsintervall med KO/leder før laget starter søk.
    - Tegn teiggrensen som skjematiske lokale kartpunkt uten ekte koordinater,
      navn, identitet eller private opplysninger.
    - Marker startpunkt og returpunkt slik at laget vet hvor søket begynner,
      hvor status meldes og hvor laget samles ved avbrudd.
    - Avklar hvordan dekningsgrad, hindringer, funn, avvik og usikre grenser
      skal meldes.
    - Oppdater planen ved ordreendring, tap av samband, farlig terreng,
      mørke/vær eller uklar lagstatus.
  safety:
    - Stans eller trekk laget ut ved tap av samband, ukjent lagstatus, farlig
      terreng, trafikkfare eller ny ordre.
    - Ikke bruk kartplanen til live tracking eller deling av sensitive
      posisjoner.
  reporting:
    - Rapporter teigstatus, dekningsgrad, hindringer, funn, avvik og behov via
      avtalt sambandsvei.
    - Meld uavklarte teiggrenser til KO/innsatsleder før laget flyttes til ny
      sektor.
  sourceIds:
    [
      src-vedlegg-c-operative-forhold,
      src-tiltakskort-under-innsats,
      src-kommunikasjons-og-sambandsdiagram
    ]
  competenceRequired: [ FIG10, FIG20 ]
  equipmentRequired: [ personlig-utrustning, samband ]
  warning: Lokal beslutningsstøtte for tildelt søketeig. KO/innsatsleder
    bestemmer teig, metode og prioritet; appen deler ikke posisjon.
  authority: leder
  reviewStatus: pending-fagperson
  doNot:
    [
      "Ikke lagre navn, identitet, ekte koordinater, private opplysninger eller
        sensitive posisjoner i kartplanen.",
      "Ikke bruk appen til live tracking eller automatisk deling av
        søksposisjon."
    ]

- slug: flom-pumpe-vannforsyning
