- slug: mre-soneplan-kart
  title: MRE soneplan på lokalt kart
  phase: under
  roles: [ mre, lagforer, leder ]
  scenarios: [ cbrn-cbrne ]
  priority: high
  steps:
    - Bekreft oppdrag, stoffmistanke, ren side, uren side, renselinje,
      innpassering og utpassering med innsatsleder/fagmyndighet før etablering.
    - Tegn ren side, uren side og renselinje som skjematiske lokale kartobjekter
      uten ekte koordinater, persondata eller pasientdata.
    - Marker avfallspunkt, kapasitet, kø, forbruk, stoppunkt og behov for
      forsterkning uten å lagre stoffdetaljer eller taktiske sperringer.
    - Kontroller vann, renseutstyr, verneutstyr, samband og makkerkontroll før
      personell flyttes gjennom renselinjen.
    - Revider planen ved værendring, ordreendring, uklar sone, skadet
      verneutstyr eller stopp i renseflyten.
  safety:
    - Appen fastsetter ikke stoff, vernenivå, sonegrense eller rensetaktikk;
      gjeldende ordre og fagmyndighet styrer.
    - Stans planlagt flyt ved ukjent stoff, uklar ren/uren grense, manglende
      vann/renseutstyr, skadet verneutstyr eller symptomer hos personell.
  reporting:
