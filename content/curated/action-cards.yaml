- slug: rute-og-evakueringsvei
  title: Rute og evakueringsvei
  phase: under
  roles: [ lagforer, leder, mannskap ]
  scenarios: [ evakuering, generelt ]
  priority: medium
  steps:
    - Avklar start, mål, hindringer, alternativ rute, retrett og ansvarlig
