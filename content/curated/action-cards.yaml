- slug: samleplass-skadde-start
  title: Start samleplass skadde
  phase: under
  roles: [ lagforer, leder, mannskap ]
  scenarios: [ samleplass-skadde ]
  priority: high
  steps:
    - Avklar med fagleder helse og innsatsleder/politi om det er behov for
      samleplass, og at den er underlagt operativ leder helse/ambulanse.
    - Velg sted nær skadestedet med kort innbæringsvei, fortrinnsvis hus eller
      telt, skjermet for innsyn og med adkomst for videre transport.
    - Etabler infrastrukturen Sivilforsvaret bistår med, etter helsepersonells
      anvisning, avsperring, merking, telt, lys, varme, bårer og ulltepper.
    - Organiser flyten i avdelinger, mottak inn, PRIO 1 akutt (rød), PRIO 2
      haster (gul), PRIO 3 vanlig (grønn) og samleplass ut.
    - Registrer alle pasienter inn og ut (kan være Sivilforsvarets oppgave),
      slik at det til enhver tid er oversikt over antall og hvor pasienter er
      videresendt, uten å registrere persondata i appen.
    - Som kvalifisert førstehjelper, hold fri luftvei, sikre pusteevne, stans
      livstruende blødninger og forebygg hypotermi inntil profesjonell hjelp
      overtar.
    - Overlat prioritering (triage), skadelapper og behandlingsbeslutninger til
      kvalifisert medisinsk personell, Sivilforsvaret bistår med hender, føtter
      og omsorg.
  safety:
    - Det er alltid kvalifisert medisinsk personell som har ansvar for
      pasientundersøkelse, skadeprioritering og behandlingsbeslutning.
    - Bruk engangshansker ved pasientkontakt.
  reporting:
    - Rapporter antall, ressursbehov og flaskehalser uten persondata.
    - Hold løpende oversikt over antall skadde på samleplass og hvor pasienter
      er videresendt.
  sourceIds: [ src-samleplass-skadde ]
  competenceRequired: [ FIG10 ]
  warning: Ikke et pasientjournalsystem.
  authority: leder
  reviewStatus: pending-fagperson
  doNot:
    [
      Ikke registrer pasientidentifiserende data i Beredskapsboka.,
      Ikke et pasientjournalsystem.
    ]

