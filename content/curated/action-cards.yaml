- slug: alvorlig-ulykke-dod-eget-personell
  title: Alvorlig ulykke eller død blant eget personell
  phase: under
  roles: [ leder, lagforer, beredskapsvakt ]
  scenarios: [ generelt, psykososial ]
  priority: high
  steps:
    - Ta ledelsen, sikre skadestedet, stans farlig arbeid og skaff oversikt over
      hvem som er berørt.
    - Varsle 113 og gi livreddende førstehjelp.
    - Varsle beredskapsvakt/sivilforsvarsdistrikt umiddelbart.
    - Hvis mulig, la noen følge syke/skadde til medisinsk
      undersøkelse/behandling.
    - Vurder, i samråd med innsatsleder, om personellet/laget skal tas ut av
      innsats.
    - Samle personellet i trygge omgivelser, gi informasjon og skjerm berørte og
      vitner.
    - Vurder behov for defuse/debrief etter innsatsen, og koordiner videre
      oppfølging med beredskapsvakt/distrikt.
  safety:
    - Alt personell som er utsatt for akutt skade eller sykdom, eller mistanke
      om dette, skal vurderes medisinsk av lege.
  reporting:
    - Rapporter kort status, tiltak, ressursbehov og hvem som håndterer videre
      varsling.
    - Fyll ut avviksrapportering (RUH) etter hendelsen.
  sourceIds:
    [
      src-tiltakskort-alvorlig-ulykke-eller-dod-eget-personell,
      src-tiltakskort-04-alvorlig-ulykke-dod-og-mental-forstehjelp
    ]
  competenceRequired: [ FIG20 ]
  equipmentRequired: [ samband ]
  warning: Følg lokalt tiltakskort og lederlinje; ikke registrer navn eller
    private detaljer i appen.
  authority: leder
  reviewStatus: pending-fagperson
  doNot:
    [
      Ikke flytt eller eksponer berørte mer enn nødvendig for livreddende
        tiltak og sikkerhet.
    ]

- slug: akutt-113-livreddende-forstehjelp
  title: Akutt 113 og livreddende førstehjelp
  phase: under
  roles: [ mannskap, lagforer, leder ]
  scenarios: [ generelt ]
  priority: high
  steps:
    - Skaff oversikt, ta ledelse, sikre skadestedet og stans farlig arbeid.
    - Gi livreddende førstehjelp innen egen kompetanse, fri luftvei, pust, stans
      livstruende blødning og forebygg nedkjøling.
    - Ring 113 og varsle innsatsleder pr. telefon, følg medisinsk veiledning.
    - Varsle beredskapsvakt/sivilforsvarsdistrikt pr. telefon.
    - Hvis mulig, sørg for at noen følger syk/skadd til medisinsk
      undersøkelse/behandling.
    - Vurder i samråd med innsatsleder om lag/avdeling skal tas ut av innsats.
    - Samle laget for informasjon, og vurder behov for defuse/debrief etter
      innsatsen.
  safety:
    - Alt personell som er utsatt for akutt skade eller sykdom, eller mistanke
      om dette, skal vurderes medisinsk av lege.
  reporting:
    - Meld 113-varsling, antall berørte og ressursbehov til leder uten
      personidentifiserende detaljer.
    - Fyll ut avviksrapportering (RUH) etter hendelsen.
  sourceIds: [ src-tiltakskort-04-alvorlig-ulykke-dod-og-mental-forstehjelp ]
  competenceRequired: [ FIG10 ]
  equipmentRequired: [ samband ]
  warning: Førstehjelpspåminnelse; følg 113, helsepersonell og lokal beredskapsordre.
  authority: leder
  reviewStatus: pending-fagperson
  doNot:
    [
      Ikke utsett mannskap for fare for å gi hjelp; trekk ut hvis området ikke
        er sikkert.
    ]

- slug: psykologisk-forstehjelp-sekvens
  title: Psykologisk førstehjelp steg for steg
  phase: etter
  roles: [ mannskap, lagforer, leder ]
  scenarios: [ psykososial ]
  priority: high
  steps:
    - Oppnå kontakt, få oversikt over hendelsen, kartlegg hvem som var direkte
      involvert, og informer beredskapsvakt/sivilforsvarsdistriktets
      EFOK-kontakt.
    - Sikkerhet og trygghet, finn et egnet sted å samle de involverte når
      situasjonen tillater det, skap en rolig atmosfære og gi mat, drikke og
      varme.
    - Stabilisering, registrer akutte stressreaksjoner, ta hånd om berørte og
      bruk de andre i gruppen.
    - Behovsorientering, registrer hva den enkelte opplevde og hvordan de
      håndterte det, og vurder hvem som kan trenge videre oppfølging.
    - Praktisk støtte, avklar og avhjelp praktiske behov som kontakt med
      pårørende og transport.
    - Sosial støtte, kartlegg den involvertes sosiale nettverk, tilby den som
      bor alene kontakt, og unngå å sende personell hjem alene.
    - Ved dimittering, lag en liste over hvor den enkelte dimitteres og
      kontaktinformasjon, dimittering skal kun skje i dialog med
      beredskapsvakt/sivilforsvarsdistrikt.
  safety:
    - Tiltak gjøres i tett samarbeid med sivilforsvarsdistriktets EFOK-kontakt.
  reporting:
    - Meld behov for oppfølging uten personidentifiserende detaljer.
