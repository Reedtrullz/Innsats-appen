    - Rapporter posisjon kort med punkt, retning/avstand, tidspunkt og
      usikkerhet.
    - Bruk lokal/offline notatstøtte og slett eller anonymiser når oppdraget er
      avsluttet.
  reporting:
    - Send posisjonsrapport kun via avtalt sambandsvei eller direkte til leder.
  sourceIds: [ src-sjekkliste-fig-og-figp, src-vedlegg-c-operative-forhold ]
  competenceRequired: [ FIG10 ]
  equipmentRequired: [ samband ]
  warning: Lokal/offline posisjonsstøtte; appen skal ikke brukes til sporing eller
    sensitiv lokasjonsdeling.
  authority: leder
  doNot:
    [
      "Ikke lagre eller send live tracking, og ikke del sensitive lokasjoner i
        åpne kanaler."
    ]

- slug: rute-og-evakueringsvei
  title: Rute og evakueringsvei
  phase: under
  roles: [ lagforer, leder, mannskap ]
  scenarios: [ evakuering, generelt ]
  priority: medium
  steps:
    - Avklar start, mål, hindringer, alternativ rute, retrett og ansvarlig
      beslutningstaker.
    - Vurder trafikk, vær, terreng, sårbare personer, kjøretøybehov og samband.
    - Oppdater laget ved ruteendring og bekreft at alle kjenner møtepunkt og
      fallback.
  reporting:
    - Rapporter lokal/offline ruteavvik, stengninger og behov til leder uten
      private adresser.
  sourceIds: [ src-vedlegg-c-operative-forhold, src-operativt-konsept-for-sivilforsvaret ]
  competenceRequired: [ FIG10 ]
  equipmentRequired: [ samband, kjoretoy ]
  warning: Rutevalg er lokal beslutning etter ordre; ikke publiser sensitive
    lokasjoner eller bevegelsesmønster.
  authority: leder
  doNot:
    [
      "Ikke lagre eller del sensitive lokasjoner, live tracking eller
        rutedetaljer som ikke er godkjent."
    ]

- slug: kjoretoy-transportberedskap
  title: Kjøretøy og transportberedskap
  phase: for
  roles: [ mannskap, lagforer, materiellansvarlig, stab-logistikk ]
  scenarios: [ generelt, evakuering ]
  priority: medium
  steps:
    - Kontroller drivstoff, lys, dekk, last, førstehjelpsutstyr, samband og
      førerstatus.
    - Avklar transportoppdrag, rute, lastbegrensning, passasjerbehov og
      parkering/mottak.
    - Meld mangler før avmarsj og planlegg avløsning ved lang varighet.
  reporting:
    - Rapporter klar/mangler, avgang, ankomst, avvik og behov for vedlikehold
      lokalt.
  sourceIds: [ src-sjekkliste-fig-og-figp, src-tiltakskort-for-innsats ]
  competenceRequired: [ FIG10 ]
  equipmentRequired: [ kjoretoy, samband ]
  warning: Generisk kjøretøysjekk; følg lokal materiellrutine, trafikkregler og ordre.
  authority: lagforer
  doNot:
    [
      "Ikke kjør med uavklart fører, usikret last, kjent teknisk feil eller
        manglende oppdrag."
    ]

- slug: atv-bat-transportlogistikk
  title: ATV, båt og transportlogistikk
  phase: for
  roles: [ atv-bat, lagforer, materiellansvarlig, stab-logistikk ]
  scenarios: [ generelt, evakuering, sok-og-redning, flom ]
  priority: medium
  reviewStatus: pending-fagperson
  steps:
    - Avklar transportoppdrag, last/passasjerbehov, varighet, mottak og hvem som
      melder klar eller mangler før enhet settes inn.
    - Bekreft relevant føreropplæring for aktuell transporttype og at lokal ordre,
      trafikk-/sjøregler, HMS og begrensninger er forstått.
    - Kontroller drivstoff, samband, lys/merking, førstehjelpsutstyr, lastesikring,
      tilhenger og relevant verne-/sikringsutstyr.
    - Vurder rute, terreng, sjø, vær, vendepunkt, parkering, alternativ rute og hva
      som må avklares med leder før avgang.
    - Planlegg avløsning, drivstoff/forbruk, enkel service, retur, vask/service og
      MBK før ny beredskap.
  reporting:
    - Rapporter klar/mangler, ruteavvik, vedlikeholdsbehov, ressursmangel og retur
      lokalt uten persondata eller kjøretøyidentifikatorer.
  sourceIds:
    [
      src-opplaering-forer-av-atb,
      src-opplaering-forer-av-bat,
      src-opplaering-materiellansvarlig-fig,
      src-sjekkliste-fig-og-figp,
      src-tiltakskort-for-innsats,
    ]
  competenceRationale: Relevant fører-/båtførerkompetanse avhenger av transporttype;
    ATV, båt og lett lastebil behandles som separate ferdigheter etter lokal
    ordre og opplæringsplan.
  equipmentRequired: [ kjoretoy, samband, verneutstyr ]
  warning: Lokal planleggingsstøtte; ikke ruteordre, kjørebok, offisiell
    ressursanmodning eller sporingssystem.
  authority: lagforer
  doNot:
    [
      "Ikke lagre navn, passasjerdetaljer, kjøretøyidentifikatorer, skjermede
        ruter eller materiell-lokasjoner i appen.",
      "Ikke sett ATV, båt eller kjøretøy inn uten relevant førerkompetanse,
        avklart oppdrag og lederens risikovurdering.",
    ]

- slug: pumpe-stromfare
  title: Pumpe ved strømfare
  phase: under
  roles: [ mannskap, lagforer, leder ]
  scenarios: [ flom ]
  priority: high
  steps:
    - Vurder om pumpested, vannvei eller arbeidsområde kan innebære strømfare
      eller elektrisk usikkerhet før pumpestart.
    - Stans arbeid og avklar videre innsats med leder når strømfare kan
      foreligge.
    - Plasser pumpe, slanger og mannskap bare etter avklart ordre, og vent på
      fagperson ved elektrisk usikkerhet.
  reporting:
    - Meld strømfare, avbrutt arbeid og behov for fagperson eller ny ordre til
      leder.
  sourceIds: [ src-eksempler-pa-utlegg-fra-pumpe, src-tiltakskort-under-innsats ]
  competenceRequired: [ FIG10 ]
  equipmentRequired: [ pumpe, slangeutlegg, verneutstyr ]
  warning: Ikke el-faglig instruks; stopp ved elektrisk usikkerhet og vent på
    ordre/fagperson.
  authority: leder
  doNot:
    [
      "Stans/avbryt umiddelbart ved mulig strømfare eller elektrisk
        usikkerhet, og vent på ordre/fagperson.",
      Ikke el-faglig instruks; stopp ved elektrisk usikkerhet og vent på
        ordre/fagperson.
    ]

- slug: kontaminert-utstyr-handtering
  title: Kontaminert eller skadet utstyr
  phase: etter
  roles: [ mannskap, lagforer, materiellansvarlig ]
  scenarios: [ generelt, brann, cbrn-cbrne ]
  priority: high
  steps:
    - Skill kontaminert utstyr fra skadet utstyr og fra rent materiell så tidlig
      som mulig.
    - Merk, pakk, vask eller sett i karantene etter lokal prosedyre og lederens
      beskjed.
    - Dokumenter materiellstatus lokalt uten sensitive hendelsesdetaljer.
  reporting:
    - Meld type avvik, mengde, behov for renhold/vedlikehold og om beredskap
      påvirkes.
  sourceIds:
    [
      src-renhold-etter-branninnsats,
      src-sjekkliste-fig-og-figp,
      src-tiltakskort-under-innsats
    ]
  competenceRequired: [ FIG10 ]
  equipmentRequired: [ verneutstyr ]
  warning: Håndter kontaminert/skadet utstyr etter lokal prosedyre; ikke registrer
    sensitive hendelsesdetaljer.
  authority: lagforer
  doNot:
    [
      Ikke ta kontaminert eller skadet utstyr tilbake i bruk før det er
        kontrollert etter lokal prosedyre.
    ]
