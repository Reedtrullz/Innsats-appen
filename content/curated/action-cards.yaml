- slug: alvorlig-ulykke-dod-eget-personell
  title: Alvorlig ulykke eller død blant eget personell
  phase: under
  roles: [ leder, lagforer, beredskapsvakt ]
  scenarios: [ generelt, psykososial ]
  priority: high
  steps:
    - Ta ledelsen, sikre skadestedet, stans farlig arbeid og skaff oversikt over
      hvem som er berørt.
    - Varsle 113 og gi livreddende førstehjelp.
    - Varsle beredskapsvakt/sivilforsvarsdistrikt umiddelbart.
    - Hvis mulig, la noen følge syke/skadde til medisinsk
      undersøkelse/behandling.
    - Vurder, i samråd med innsatsleder, om personellet/laget skal tas ut av
      innsats.
    - Samle personellet i trygge omgivelser, gi informasjon og skjerm berørte og
      vitner.
    - Vurder behov for defuse/debrief etter innsatsen, og koordiner videre
      oppfølging med beredskapsvakt/distrikt.
  safety:
    - Alt personell som er utsatt for akutt skade eller sykdom, eller mistanke
      om dette, skal vurderes medisinsk av lege.
  reporting:
    - Rapporter kort status, tiltak, ressursbehov og hvem som håndterer videre
      varsling.
    - Fyll ut avviksrapportering (RUH) etter hendelsen.
  sourceIds:
    [
      src-tiltakskort-alvorlig-ulykke-eller-dod-eget-personell,
      src-tiltakskort-04-alvorlig-ulykke-dod-og-mental-forstehjelp
    ]
  competenceRequired: [ FIG20 ]
  equipmentRequired: [ samband ]
  warning: Følg lokalt tiltakskort og lederlinje; ikke registrer navn eller
    private detaljer i appen.
  authority: leder
  reviewStatus: pending-fagperson
  doNot:
    [
      Ikke flytt eller eksponer berørte mer enn nødvendig for livreddende
        tiltak og sikkerhet.
    ]

- slug: akutt-113-livreddende-forstehjelp
  title: Akutt 113 og livreddende førstehjelp
  phase: under
  roles: [ mannskap, lagforer, leder ]
  scenarios: [ generelt ]
  priority: high
  steps:
    - Skaff oversikt, ta ledelse, sikre skadestedet og stans farlig arbeid.
    - Gi livreddende førstehjelp innen egen kompetanse, fri luftvei, pust, stans
      livstruende blødning og forebygg nedkjøling.
    - Ring 113 og varsle innsatsleder pr. telefon, følg medisinsk veiledning.
    - Varsle beredskapsvakt/sivilforsvarsdistrikt pr. telefon.
    - Hvis mulig, sørg for at noen følger syk/skadd til medisinsk
      undersøkelse/behandling.
    - Vurder i samråd med innsatsleder om lag/avdeling skal tas ut av innsats.
    - Samle laget for informasjon, og vurder behov for defuse/debrief etter
      innsatsen.
  safety:
    - Alt personell som er utsatt for akutt skade eller sykdom, eller mistanke
      om dette, skal vurderes medisinsk av lege.
  reporting:
    - Meld 113-varsling, antall berørte og ressursbehov til leder uten
      personidentifiserende detaljer.
    - Fyll ut avviksrapportering (RUH) etter hendelsen.
  sourceIds: [ src-tiltakskort-04-alvorlig-ulykke-dod-og-mental-forstehjelp ]
  competenceRequired: [ FIG10 ]
  equipmentRequired: [ samband ]
  warning: Førstehjelpspåminnelse; følg 113, helsepersonell og lokal beredskapsordre.
  authority: leder
  reviewStatus: pending-fagperson
  doNot:
    [
      Ikke utsett mannskap for fare for å gi hjelp; trekk ut hvis området ikke
        er sikkert.
    ]

- slug: psykologisk-forstehjelp-sekvens
  title: Psykologisk førstehjelp steg for steg
  phase: etter
  roles: [ mannskap, lagforer, leder ]
  scenarios: [ psykososial ]
  priority: high
  steps:
    - Oppnå kontakt, få oversikt over hendelsen, kartlegg hvem som var direkte
      involvert, og informer beredskapsvakt/sivilforsvarsdistriktets
      EFOK-kontakt.
    - Sikkerhet og trygghet, finn et egnet sted å samle de involverte når
      situasjonen tillater det, skap en rolig atmosfære og gi mat, drikke og
      varme.
    - Stabilisering, registrer akutte stressreaksjoner, ta hånd om berørte og
      bruk de andre i gruppen.
    - Behovsorientering, registrer hva den enkelte opplevde og hvordan de
      håndterte det, og vurder hvem som kan trenge videre oppfølging.
    - Praktisk støtte, avklar og avhjelp praktiske behov som kontakt med
      pårørende og transport.
    - Sosial støtte, kartlegg den involvertes sosiale nettverk, tilby den som
      bor alene kontakt, og unngå å sende personell hjem alene.
    - Ved dimittering, lag en liste over hvor den enkelte dimitteres og
      kontaktinformasjon, dimittering skal kun skje i dialog med
      beredskapsvakt/sivilforsvarsdistrikt.
  safety:
    - Tiltak gjøres i tett samarbeid med sivilforsvarsdistriktets EFOK-kontakt.
  reporting:
    - Meld behov for oppfølging uten personidentifiserende detaljer.
  sourceIds:
    [
      src-tiltakskort-psykologisk-forstehjelp,
      src-psykososial-oppfolging-og-kollegastotte
    ]
  competenceRequired: [ FIG10 ]
  warning: Støttekort, ikke diagnose eller behandling; bruk kvalifisert hjelp ved
    akutt psykisk fare.
  authority: leder
  reviewStatus: pending-fagperson
  doNot:
    [
      "Ikke press frem detaljer, skyldspørsmål eller forklaringer; la personen
        styre tempoet."
    ]

- slug: psykososial-ikke-tvungen-debrief
  title: Unngå tvungen debrief og press
  phase: etter
  roles: [ lagforer, leder, mannskap ]
  scenarios: [ psykososial ]
  priority: high
  steps:
    - Tilby defuse, praktisk støtte, hvile og informasjon om normale reaksjoner.
    - La berørte velge hvor mye de vil si, og følg opp senere ved behov.
    - Eskaler bekymring for akutt fare, sterk funksjonssvikt eller vedvarende
      reaksjoner til leder/helse.
  reporting:
    - Meld kun behov for videre oppfølging og praktiske tiltak gjennom
      lederlinjen.
  sourceIds:
    [
      src-tiltakskort-psykologisk-forstehjelp,
      src-psykososial-oppfolging-og-kollegastotte
    ]
  competenceRequired: [ FIG10 ]
  warning: Psykososial støtte skal være frivillig og skånsom; ikke bruk tvungen
    debrief eller detaljpress.
  authority: leder
  doNot:
    [
      "Ikke gjennomfør tvungen debrief, ikke press detaljer og ikke samle
        forklaringer som behandling."
    ]

- slug: skogbrann-startkort
  title: Skogbrann støtteinnsats
  phase: under
  roles: [ mannskap, lagforer, leder ]
  scenarios: [ skogbrann, brann ]
  priority: high
  steps:
    - Vurder egen sikkerhet og plassering i forhold til oppmarsjområdet ved
      ankomst.
    - Når ledelse er satt, kontakt innsatsleder (brannvesenets fagleder) for
      oppdrag, sektor og videre instrukser.
    - Revurder personlig utrustning og felles utstyr, og vurder behov for ekstra
      ressurser, vann og logistikk.
    - Avklar vannkilder, pumpeplasser og mulig slangevei tidlig dersom laget
      skal støtte vannforsyning.
    - Lag en foreløpig plan, forbered 5-punktsordre og gi deretter ordre til
      mannskap.
    - Hold kontinuerlig kontroll over personellet og løpende dialog med
      innsatsleder.
    - Før logg, og foreta ny analyse ved endring av oppdraget eller brannbildet.
    - Påse behov for mat, vann og hvile, og vurder behov for avløsning i god tid.
  safety:
    - Egensikkerhet er alltid 1. prioritet, vurder aktivitet i forhold til
      sikkerhet.
    - Trekk ut ved skiftende vind, røykeksponering, tap av retrettvei eller
      uklart oppdrag.
  reporting:
    - Rapporter sektorstatus, mannskapsstatus, vannbehov og observerte
      fareendringer.
    - Rapporter til beredskapsvakt/sivilforsvarsdistrikt.
  sourceIds:
    [
      src-tiltakskort-under-innsats,
      src-kursplan-grunnkurs-fig10,
      src-eksempler-pa-utlegg-fra-pumpe
    ]
  competenceRequired: [ FIG10 ]
  equipmentRequired: [ verneutstyr, samband, vann ]
  warning: Generisk støtte for Sivilforsvaret; følg brannvesenets innsatsledelse
    og lokal ordre.
  authority: leder
  reviewStatus: pending-fagperson

- slug: skogbrann-vannforsyningsplan
  title: Skogbrann vannforsyningsplan
  phase: under
  roles: [ lagforer, leder, materiellansvarlig ]
  scenarios: [ skogbrann, brann ]
  priority: high
  steps:
    - action: Bekreft sektor, leveringspunkt og ønsket effekt med innsatsleder før laget legger pumpe eller slange.
      how: >-
        Be om et konkret leveringspunkt og hva vannet skal brukes til: fylle
        kar/tank, holde en branngate/fuktingslinje, forsyne strålerør, spyle
        etterslokking eller bygge reserve. Avklar om prioriteten er mest vann,
        stabilt trykk, rask etablering, lang varighet eller sikker retrett. Skriv
        ned hvem som kan endre leveringspunktet, hvor laget skal trekke seg ved
        vindskifte, og hva som er minstekravet for at utlegget fortsatt har
        verdi. Uten denne avklaringen blir seriekjøring og trykkforsterkning bare
        gjetting.
      sourceIds: [src-tiltakskort-under-innsats, src-5-punktsordre]
    - action: Tegn vannveien som en kjede fra vannkilde til leveringspunkt.
      how: >-
        Lag en enkel skisse: vannkilde -> kildepumpe -> eventuell mellompumpe
        for trykkforsterkning/seriekjøring -> eventuell forgrening eller
        samlerør -> leveringspunkt. Navngi mønsteret hvis det passer med lokal
        tegning/opplæring: enkelt utlegg, A-utlegg, lett MBS-utlegg,
        gjennomgående grenrør, veikryssing med slangebro, parallelt/dobbelt
        utlegg eller seriekjøring prinsipp 1/2. Marker omtrentlige etapper,
        høydeforskjell, vegkryssing, knekkpunkt, varm/røykutsatt del,
        kjøretøy-/ATV-adkomst, drivstoffpunkt og hvem som vokter hvert kritisk
        punkt. Bruk appkartet bare som lokal skisse; ikke legg inn sensitive
        lokasjoner eller del skjermet ruteinformasjon videre.
      imageIds:
        [
          pumpeutlegg-image-1,
          pumpeutlegg-image-2,
          pumpeutlegg-image-3,
          pumpeutlegg-image-4,
          pumpeutlegg-image-5,
          pumpeutlegg-image-6,
          pumpeutlegg-image-7
        ]
      sourceIds: [src-eksempler-pa-utlegg-fra-pumpe, src-operativt-konsept-for-sivilforsvaret, src-grunnopplaering-mfe-10-mannskap]
    - action: Velg vannkilde og pumpeplass med sikker drift, kort sugeside og retrett.
      how: >-
        Prioriter stabil vannkilde, fast underlag og kortest mulig ryddig
        sugeside. Sil/sug skal ligge dypt nok til ikke å trekke luft, men ikke
        suge slam, sand, planter eller bunnen. Plasser pumpe slik at den kan
        etterfylles med drivstoff, luftes, stanses, flyttes og overvåkes uten at
        mannskap må stå i røyk, varme, trafikk eller ustabil kant. Tenk også på
        eksos, støy, lys i mørke, slange som kan rykke ved trykksetting, og
        mulighet for å få inn ekstra pumpe/slange uten å blokkere retrett.
      sourceIds: [src-kursplan-grunnkurs-fig10, src-operativt-konsept-for-sivilforsvaret, src-grunnopplaering-mfe-10-mannskap]
    - action: Velg mellom enkelt utlegg, parallelt/dobbelt utlegg og seriekjøring/trykkforsterkning.
      how: >-
        Enkelt utlegg passer når avstand, høydeforskjell og vannmengde er
        moderate. Parallelt eller dobbelt utlegg mellom samme punkter kan brukes
        når friksjonstapet er hovedproblemet og dere har nok slange,
        overganger/samlerør og mannskap; da fordeles vannet på flere slanger og
        trykktapet faller kraftig. Seriekjøring/trykkforsterkning passer når
        linjen er lang eller går oppover og en pumpe alene ikke kan levere
        nødvendig trykk ved leveringspunktet. Da må kildepumpen gi jevn
        vanntilførsel til mellompumpen, og mellompumpen plasseres for å løfte
        trykket videre uten å bli sultet for vann.
      sourceIds: [src-kursplan-grunnkurs-fig10, src-operativt-konsept-for-sivilforsvaret, src-eksempler-pa-utlegg-fra-pumpe]
    - action: Bruk en enkel trykk- og tapsskisse for faggjennomgang, ikke som fasit.
      how: >-
        Regnekladde for leder/pumpekyndig: nødvendig pumpetrykk består av
        ønsket trykk/effekt ved leveringspunktet, pluss trykktap i slanger og
        armatur, pluss høydeforskjell. Som grov fysikkregel krever hver meter
        oppover omtrent 0,1 bar bare for å løfte vannet; friksjonstap kommer i
        tillegg og øker raskt med høyere vannføring, lengre slange, mindre
        diameter, knekk, skadet slange og unødvendige overganger. Bruk lokale
        pumpetabeller, slangedimensjoner, pumpekurver og fagressurs for tall.
        Hvis skissen ikke går opp: kortere etapper, større slange, parallelt
        utlegg, flyttet leveringspunkt eller ekstra pumpe vurderes før noen
        skrur opp trykket.
      sourceIds: [src-kursplan-grunnkurs-fig10, src-operativt-konsept-for-sivilforsvaret]
    - action: Plasser mellompumpe for seriekjøring der den kan overvåkes og mates stabilt.
      how: >-
        Mellompumpen bør stå utenfor varm/røykutsatt del, nær adkomst for
        drivstoff, lys og avløsning, og foran den delen av utlegget der trykket
        ellers blir for lavt. Den må ha stabil innkommende vannmengde; tegn på
        sultet mellompumpe er fallende/ujevnt trykk, luft, kavitasjonslyd eller
        at slangen inn flater ut. Avtal startrekkefølge og samband: kildepumpe
        etablerer vann, mellompumpe bekrefter vann inn, leveringspunkt bekrefter
        vann ut, deretter økes trykket gradvis. Unngå å stenge bratt nedstrøms
        mens pumper går hardt.
      sourceIds: [src-kursplan-grunnkurs-fig10, src-operativt-konsept-for-sivilforsvaret, src-grunnopplaering-mfe-10-mannskap]
    - action: Planlegg forgreninger, ventiler og prioritering før trykket blir brukt opp.
      how: >-
        Sett forgrening/samlerør på et sted som kan betjenes, ikke midt i
        brannfront, trafikk eller ulendt terreng. Avklar hva som stenges først
        dersom trykket faller: reservegren, sekundært leveringspunkt eller
        spyling som ikke er kritisk. Ikke bygg mange små avtak før hovedlinjen
        er stabil. Ved flere grener: hold mest mulig like slangelengder og
        dimensjoner, og meld til leder at en ny gren kan stjele trykk fra
        eksisterende leveringspunkt.
      sourceIds: [src-operativt-konsept-for-sivilforsvaret, src-eksempler-pa-utlegg-fra-pumpe]
    - action: Legg slangevei slik at den kan kontrolleres, beskyttes og flyttes.
      how: >-
        Følg veikant, sti, grøft eller ryddig trasé der mannskap kan gå trygt
        langs linjen. Unngå skarpe kanter, stein, glør, varme partier, krappe
        vinkler, trange porter og kjøretøyspor uten slangebro/beskyttelse. La
        koblinger ligge synlig, med litt slakk ved pumpe, ventiler, svinger og
        leveringspunkt. Ved oppoverbakke sikres slangen mot glidning; ved
        nedoverbakke må pumpelag og leveringspunkt være obs på trykkstøt, luft
        og ukontrollert bevegelse når linjen fylles eller stenges.
      sourceIds: [src-eksempler-pa-utlegg-fra-pumpe, src-tiltakskort-under-innsats, src-sjekkliste-fig-og-figp]
    - action: Fordel roller for oppstart, lufting, linjevakt og samband.
      how: >-
        Minst en person må ha pumpeansvar ved hver pumpe, en må kunne gå eller
        overvåke kritiske koblinger/knekkpunkt, og leveringspunktet må kunne gi
        klar beskjed om vann, trykk og avbrudd. Avtal korte meldinger for
        "fyller linje", "vann framme", "øk sakte", "hold", "reduser" og "stopp".
        Fyll linjen kontrollert, luft ut ved høypunkt/leveringspunkt der det er
        mulig, og øk trykket i trinn mens noen ser etter lekkasje,
        slangebevegelse, knekk og folk som står farlig til.
      sourceIds: [src-tiltakskort-under-innsats, src-kursplan-grunnkurs-fig10]
    - action: Feilsok trykkfall, vannmangel og ustabil drift systematisk.
      how: >-
        Svak levering kan skyldes for liten vannkilde, luft på sugesiden,
        tett/for grunt sil, knekk, delvis stengt ventil, skadet slange, for
        mange grener, for små slanger, for lang etappe, stor høydeforskjell eller
        pumpe som går tom for drivstoff. Sultet mellompumpe: reduser uttak
        nedstrøms og be oppstrøms pumpe stabilisere vann inn. Kavitasjon/ujevn
        gange ved kildepumpe: senk krav, sjekk sugeside/sil og vannstand. Lekkasjer
        eller slange som hopper: reduser trykk, avlast, bytt slange eller legg om.
      sourceIds: [src-kursplan-grunnkurs-fig10, src-eksempler-pa-utlegg-fra-pumpe, src-grunnopplaering-mfe-10-mannskap]
    - action: Pakk behovet for ekstra pumper, slanger eller MFE-støtte som en konkret anmodning.
      how: >-
        Når lokal vannforsyning ikke strekker til, meld en ferdig pakke: sektor
        og oppdrag, vannkilde, leveringspunkt, skisse/navngitt utlegg, antatt
        flaskehals, vær/vind/terreng, hva som trengs av pumper, slanger,
        armatur/samlerør, overganger, ATV/kjøretøy og mannskap, ønsket
        oppmøtested, kontaktperson, sambandsplan, varighet og om det trengs
        avløsning. Skill tydelig mellom "vi mangler materiell", "vi mangler
        trykk", "vi mangler vann inn" og "vi mangler folk til å holde linjen".
      sourceIds: [src-tiltakskort-05-stotte-av-mfe, src-grunnopplaering-mfe-10-mannskap, src-tiltakskort-03-innsats]
    - action: Revider planen ved endret brannbilde, vind, sektor, leveringspunkt eller materiellsvikt.
      how: >-
        Ny vindretning, flyttet brannfront, mer røyksatt trasé, tapt samband,
        skadet pumpe, drivstoffmangel, knekt slange eller nytt leveringspunkt er
        grunn til å stoppe og tegne kjeden på nytt. Meld hva som fortsatt virker,
        hva som er flaskehalsen, og hva som trengs: mer slange, større slange,
        ekstra pumpe, samlerør, overganger, drivstoff, ATV/kjøretøy, linjevakter
        eller avløsning. Ikke dra laget lenger frem bare for å redde et dårlig
        utlegg.
      sourceIds: [src-tiltakskort-under-innsats, src-operativt-konsept-for-sivilforsvaret]
    - action: Avslutt eller flytt utlegget kontrollert.
      how: >-
        Ved stans: informer hele kjeden, reduser trykk gradvis, unngå bratt
        ventilavstenging, tapp/drener der det er mulig, og hold kontroll på
        slange som kan bevege seg. Ved flytting: behold bare den delen av
        slangeveien som fortsatt er sikker og nyttig, merk skadet materiell
        lokalt uten utstyrsidentifikatorer, og planlegg vask, tørk, drivstoff,
        service og retur til beredskap.
      sourceIds: [src-tiltakskort-etter-innsats, src-eksempler-pa-utlegg-fra-pumpe]
  safety:
    - Hold retrettvei og sikker sone kjent før utlegg går frem mot brannen.
    - Stans utlegg ved uavklart røyk-/varmepåkjenning, trafikkfare, strømfare
      eller tap av samband.
    - La trent pumpepersonell/fagressurs bekrefte trykk, kapasitet,
      seriekjøring og trykkforsterkning før drift presses hardere.
    - Reduser eller stopp trykket før slange, kobling, pumpe, forgrening eller
      leveringspunkt flyttes.
  reporting:
    - Rapporter vannkilde, pumpeplass, slangevei, kjent begrensning og behov for
      ekstra pumper, slanger, overganger eller mannskap.
    - Meld raskt om trykkfall, vannmangel, skadet slange, flyttet brannfront
      eller behov for avløsning.
    - >-
      Ved seriekjøring: rapporter status for hver pumpe i kjeden, hvem som
      bemanner den og hvilket punkt som er flaskehals.
    - >-
      Ved parallelle/doble utlegg eller forgreninger: rapporter hvilke linjer
      som er prioritert dersom trykket faller.
  sourceIds:
    [
      src-tiltakskort-under-innsats,
      src-5-punktsordre,
      src-eksempler-pa-utlegg-fra-pumpe,
      src-kursplan-grunnkurs-fig10,
      src-enhetlig-ledelsessystem-els,
      src-grunnopplaering-mfe-10-mannskap,
      src-sjekkliste-fig-og-figp,
      src-tiltakskort-05-stotte-av-mfe,
      src-tiltakskort-03-innsats,
      src-tiltakskort-etter-innsats,
      src-operativt-konsept-for-sivilforsvaret
    ]
  competenceRequired: [ FIG10 ]
  equipmentRequired: [ pumpe, slangeutlegg, samband, vann, verneutstyr ]
  warning: Planleggingsstøtte for pumpe og slange; innsatsleder og fagressurs
    bestemmer taktikk og kapasitet.
  authority: leder
  reviewStatus: pending-fagperson
  doNot:
    [
      "Ikke dimensjoner vannforsyning på tall fra appen alene; avklar kapasitet,
        trykk og taktikk med leder/fagressurs.",
      "Ikke flytt pumpe, slangevei eller leveringspunkt inn i ny risiko uten
        ordre og kjent retrettvei.",
      "Ikke bruk regneeksempler eller tommelfingerregler som ordre, pumpekurve
        eller brannfaglig dimensjonering."
    ]

- slug: brann-vannforsyning-slange
  title: Brannstøtte med vannforsyning og slange
  phase: under
  roles: [ mannskap, lagforer, materiellansvarlig ]
  scenarios: [ brann, skogbrann ]
  priority: medium
  steps:
    - Avklar oppdrag, ønsket leveringspunkt, vannkilde, pumpeplass, slangevei
      og trygt arbeidsområde med leder.
    - Velg pumpeplass med sikker adkomst, plass til materiell og mulighet for
      å holde mannskap unna trafikk, varme, røyk og ustabil kant.
    - Planlegg slangevei fra vannkilde/pumpe til leveringspunkt før utlegg;
      hold rømningsvei, ferdsel og kjøretøyflyt åpne så langt det lar seg gjøre.
    - Vurder vannføring og trykktap i slangeutlegget; be leder avklare om
      trykkforsterkning, seriekjøring eller kortere etapper trengs.
    - Ved lang avstand eller stor vannmengde, vurder parallelle utlegg mellom
      pumper når nok slanger, overganger og samlerør er tilgjengelig.
    - Legg slanger slik at koblinger kan kontrolleres og slangen beskyttes mot
      knekk, skarpe kanter, kjøretøy og friksjonsskader.
    - Overvåk vannkilde, pumpe, koblinger, trykkendringer, knekk,
      friksjonsskader, drivstoff og behov for mer materiell.
    - Oppdater leder med pumpeplass, slangevei, kjent begrensning og behov for
      ekstra slanger, pumper eller mannskap.
  reporting:
    - Meld kapasitet, avbrudd, vannmangel, trykktap og materiellbehov til leder.
    - Noter lokalt hvor vannkilde, pumpeplass og slangevei ligger, uten å dele
      sensitive lokasjonsdetaljer videre i appen.
  sourceIds:
    [
      src-tiltakskort-under-innsats,
      src-eksempler-pa-utlegg-fra-pumpe,
      src-kursplan-grunnkurs-fig10
    ]
  competenceRequired: [ FIG10 ]
  equipmentRequired: [ pumpe, slangeutlegg, samband ]
  warning: Ikke brannteknisk taktikk; utfør bare støtteoppgaver gitt av innsatsledelse.
  authority: lagforer
  reviewStatus: pending-fagperson
  doNot:
    [
      "Stans ved fare fra trafikk, røyk, varme, elektrisk anlegg eller ustabil
        vannvei.",
      "Ikke dimensjoner vannforsyning på tall fra appen alene; avklar kapasitet,
        trykk og taktikk med leder/fagressurs.",
      Ikke brannteknisk taktikk; utfør bare støtteoppgaver gitt av
        innsatsledelse.
    ]

- slug: sok-og-redning-startkort
  title: Søk og redning startkort
  phase: under
  roles: [ mannskap, lagforer, leder ]
  scenarios: [ sok-og-redning ]
  priority: high
  steps:
    - Motta oppdrag, siste kjente punkt, tildelt søksområde, samband og
      sikkerhetsbrief fra innsatsledelse.
    - Vurder egen sikkerhet og plassering, og revurder personlig utrustning og
      felles utstyr, kart, kompass og GPS.
    - Lag en foreløpig plan, forbered 5-punktsordre og gi ordre til laget før
      innrykk.
    - Gjennomfør søk etter tildelt metode, hold laget samlet eller etter avtalt
      makkerordning.
    - Hold kontinuerlig kontroll over personellet, løpende dialog med
      innsatsleder, og før logg.
    - Merk funn og observasjoner lokalt og meld raskt, uten å spre private
      opplysninger.
    - Påse behov for mat, vann og hvile, og vurder behov for avløsning i god tid.
  safety:
    - Vurder aktivitet i forhold til sikkerhet, og foreta ny analyse ved endring
      av oppdraget.
  reporting:
    - Rapporter dekningsgrad, funn, mangler, posisjon og behov til KO/leder.
    - Rapporter til beredskapsvakt/sivilforsvarsdistrikt etter innsats.
  sourceIds: [ src-vedlegg-c-operative-forhold, src-tiltakskort-under-innsats ]
  competenceRequired: [ FIG10 ]
  equipmentRequired: [ personlig-utrustning, samband ]
  warning: Lokal/offline søksstøtte; ikke lagre personsensitiv informasjon eller
    operative søksplaner for videre deling.
  authority: leder
  reviewStatus: pending-fagperson
  doNot:
    [
      "Stans søk ved tap av samband, farlig terreng, mørke/ vær eller uklar
        lagstatus."
    ]

- slug: soketeig-sektor
  title: Søkesektor og teig
  phase: under
  roles: [ lagforer, mannskap ]
  scenarios: [ sok-og-redning ]
  priority: medium
  steps:
    - Bekreft teiggrense, startpunkt, sluttpunkt, metode og forventet
      rapporteringsintervall.
    - Hold oversikt over hva som faktisk er gjennomsøkt og hvilke hindringer som
      står igjen.
    - Meld avvik, usikre grenser og behov for ny teig før laget flyttes.
  reporting:
    - Rapporter teigstatus, dekningsgrad, hindringer og lokale
      posisjonsreferanser.
  sourceIds: [ src-vedlegg-c-operative-forhold ]
  competenceRequired: [ FIG10 ]
  equipmentRequired: [ samband ]
  warning: Bruk kun som lokal huskeliste; søksledelse og KO bestemmer sektor,
    metode og prioritet.
  authority: lagforer
  doNot:
    [
