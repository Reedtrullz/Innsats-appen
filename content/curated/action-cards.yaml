      src-vedlegg-c-operative-forhold,
      src-samleplass-skadde
    ]
  competenceRequired: [ FIG10 ]
  equipmentRequired: [ samband, kjoretoy ]
  warning: Offentlig støtte; kommunen/politi/innsatsledelse gir beslutning, rute
    og prioritet.
  authority: leder
  reviewStatus: pending-fagperson
  doNot:
    [
      "Ikke gå inn i område uten sikker adkomst, sambandsvei og avklart
        retrett."
    ]

