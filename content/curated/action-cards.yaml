  equipmentRequired: [ personlig-utrustning, samband ]
  warning: Ikke skredfaglig instruks; følg fagmyndighet, innsatsledelse og gitt ordre.
  authority: leder
  doNot:
    [
      "Stans ved ustabilt terreng, uavklart sone, endrede forhold eller
        manglende ordre/faglig avklaring.",
      "Ikke skredfaglig instruks; følg fagmyndighet, innsatsledelse og gitt
        ordre."
    ]

- slug: evakueringsstotte
  title: Evakueringsstøtte
  phase: under
  roles: [ mannskap, lagforer, leder, stab-logistikk ]
  scenarios: [ evakuering ]
  priority: high
  steps:
    - Avklar at politiet/kommunen har det overordnede ansvaret, og at
      evakueringen gjennomføres i samråd med politiet.
    - Etabler samleplass for evakuerte i telt eller nærliggende bygning,
      skjermet fra media og publikum.
    - Bistå med registrering av evakuerte ved mottak, uten å registrere
      persondata i appen.
    - Bistå med midlertidig forpleining, mat, drikke og varme, og enkel pleie og
      omsorg.
    - Bistå med transport og bemann kontrollpunkt etter ansvarlig myndighets
      plan.
    - Hold oversikt over ressursbehov og flaskehalser, og meld dette til leder.
  reporting:
    - Rapporter status, transportbehov, hindringer og ressursmangler til leder.
  sourceIds:
