- slug: skred-sikkerhet-samvirke
  title: Skred sikkerhet og samvirke
  phase: under
  roles: [ mannskap, lagforer, leder ]
  scenarios: [ skred ]
  priority: high
  steps:
    - Avklar med innsatsledelse/fagmyndighet før mannskap går inn i område med
