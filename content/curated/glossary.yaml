  synonyms: [radiacmåling, stråling, dose, dosimeter, doserate]
  sourceIds: [src-bestemmelse-radiacmaletjeneste-del-i]
- term: samband
  definition: Planlagt samband beskriver radiobruk, kallesignal, kanaler/talegrupper og alternative kontaktveier.
  synonyms: [radio, nødnett, kallesignal, sambandstest, kommunikasjonsplan, sambandsplan]
  sourceIds: [src-kommunikasjons-og-sambandsdiagram, src-5-punktsordre]
- term: samleplass
  definition: Samleplass brukes som felles oppmøte-, mottaks- eller samlepunktsbegrep etter oppdragets plan.
  aliases: [oppmøtested, frammøtested]
  synonyms: [depot, staging, mottakspunkt, samlepunkt]
  sourceIds: [src-kursplan-grunnkurs-fig10, src-5-punktsordre]
- term: ordre
  definition: 5-punktsordre strukturerer situasjon, oppdrag, plan/utførelse, administrasjon/forsyning og ledelse/samband.
  aliases: [5-punktsordre]
  synonyms: [fempunktsordre, oppdrag, ordrepunkt, situasjon, utførelse, ledelse]
  sourceIds: [src-5-punktsordre]
- term: KO
  definition: Kommandoplass/KO og IL-KO brukes som søkeord for ledelsesplass i innsatsområdet.
  aliases: [IL-KO, ilko, ko]
  synonyms: [kommandoplass, innsatsleders KO, innsatsleders IL-KO]
  sourceIds: [src-5-punktsordre, src-operativt-konsept-for-sivilforsvaret]
- term: innsatsleder
  definition: Innsatsleder/IL er et samvirkebegrep som ofte brukes sammen med politi, brann, helse og stab.
  aliases: [IL]
  synonyms: [innsatsledelse, politi, brann, helse, stab]
  sourceIds: [src-5-punktsordre, src-enhetlig-ledelsessystem-els]
- term: beredskapsvakt
  definition: Beredskapsvakt/vakthavende dekker vaktfunksjon, mottak av varsler og første oppfølging.
  aliases: [vakt]
  synonyms: [vakthavende, varselmottak]
  sourceIds: [src-opplaeringsplan-for-beredskapsvakt]
- term: pumpe
  definition: Pumpe og lensepumpe brukes ved flom, vannforsyning, slangeutlegg og vannskade.
