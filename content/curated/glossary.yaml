  synonyms: [flom, vannforsyning, slangeutlegg, vannskade]
  sourceIds: [src-eksempler-pa-utlegg-fra-pumpe, src-operativt-konsept-for-sivilforsvaret]
- term: skadde
  definition: Søketermer for skadde og førstehjelp peker til livreddende tiltak; ikke registrer pasientdata i appen.
  aliases: [skadet]
  synonyms: [samleplass, førstehjelp, "113", livreddende førstehjelp, pasient]
  sourceIds: [src-tiltakskort-04-alvorlig-ulykke-dod-og-mental-forstehjelp, src-livreddende-tiltak-ved-rn-hendelse]
- term: psykososial
  definition: Psykososial oppfølging dekker defuse/defusing, debrief, EFOK, kollegastøtte og psykisk førstehjelp.
  aliases: [EFOK]
  synonyms: [defuse, defusing, debrief, kollegastøtte, psykisk førstehjelp]
  sourceIds: [src-psykososial-oppfolging-og-kollegastotte, src-tiltakskort-psykologisk-forstehjelp]
- term: MBK
  definition: Materiellberedskapskontroll/MBK dekker materiellkontroll, etterkontroll, klargjøring og service etter bruk.
