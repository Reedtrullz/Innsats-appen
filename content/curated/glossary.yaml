  sourceIds: [src-bestemmelse-radiacmaletjeneste-del-i]
- term: rens
  definition: Grov-/finrens ved CBRN-hendelser skal skille ren og uren side.
  synonyms: [sanering, dekontaminering, grovrens, finrens, ren side, uren side, MRE, CBRN]
