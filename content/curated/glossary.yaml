- term: MFE
  definition: Mobil forsterkningsenhet som kan støtte distrikter ved større hendelser.
  synonyms: [mobil forsterkningsenhet, forsterkningsenhet, nasjonal støtte, støtteanmodning]
  sourceIds: [src-grunnopplaering-mfe-10-mannskap]
- term: RADIAC
